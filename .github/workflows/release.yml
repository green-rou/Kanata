name: CI / Release

on:
  push:
    branches: [main, master, 'dev*']
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build debug
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install NDK
        run: ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

  build-mods:
    name: Build mods
    if: "startsWith(github.ref, 'refs/heads/dev')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all mods
        run: |
          for mod_dir in mods/source-*/; do
            mod_name=$(basename "$mod_dir")
            ./gradlew -p mods ":${mod_name}:assembleRelease" --no-daemon
          done

      - name: Collect APKs
        run: |
          mkdir -p mod-apks
          while IFS='|' read -r id parser; do
            src="mods/${id}/build/outputs/apk/release/${id}-release-unsigned.apk"
            [ -f "$src" ] && cp "$src" "mod-apks/${id}__${parser}.apk"
          done < <(jq -r '.[] | "\(.id)|\(.parserClass)"' mods/index.json)

      - name: Publish to mods-dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete mods-dev --yes 2>/dev/null || true
          gh release create mods-dev \
            --title "Mods (dev)" \
            --prerelease \
            --notes "Dev mod builds — updated automatically on every push to dev branches." \
            mod-apks/*.apk

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install NDK
        run: ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ github.ref_name }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk Kanata-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Kanata-${{ github.ref_name }}.apk
          generate_release_notes: true

      - name: Delete secrets
        if: always()
        run: rm -f release.keystore app/google-services.json
