name: F-Droid Repo

on:
  workflow_run:
    workflows: ["CI / Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release APK
        run: |
          mkdir -p fdroid/repo
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_TAG" --pattern "*.apk" --dir fdroid/repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy app icon
        run: cp AppIcon.png fdroid/repo/icon.png 2>/dev/null || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fdroid/keystore.jks

      - name: Generate index-v1.json
        run: python3 fdroid/generate_index.py fdroid/repo
        env:
          REPO_URL:  "https://github.com/green-rou/Kanata/releases/download/fdroid-repo"
          REPO_NAME: "Kanata"
          REPO_DESC: "Official Kanata releases"

      - name: Pack and sign index-v1.jar
        run: |
          cd fdroid/repo
          zip -j index-v1.jar index-v1.json
          jarsigner \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            index-v1.jar "${{ secrets.KEY_ALIAS }}"

      - name: Publish to fdroid-repo release
        run: |
          cat > /tmp/fdroid_notes.md << 'EOF'
          ### F-Droid Repository
          Add in F-Droid: Settings > Repositories > +
          https://github.com/green-rou/Kanata/releases/download/fdroid-repo
          EOF

          gh release delete fdroid-repo --yes --cleanup-tag 2>/dev/null || true
          gh release create fdroid-repo \
            --title "F-Droid Repository" \
            --notes-file /tmp/fdroid_notes.md \
            fdroid/repo/*.apk \
            fdroid/repo/index-v1.jar \
            fdroid/repo/index-v1.json \
            fdroid/repo/icon.png
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -f fdroid/keystore.jks
