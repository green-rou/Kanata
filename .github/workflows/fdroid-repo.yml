name: F-Droid Repo

on:
  workflow_run:
    workflows: ["CI / Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Download latest release APK
        run: |
          mkdir -p fdroid/repo
          gh release download --latest --pattern "*.apk" --dir fdroid/repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fdroid/keystore.jks

      - name: Generate fdroid config
        run: |
          cat > fdroid/config.yml << 'EOF'
          repo_url: "https://green-rou.github.io/Kanata/fdroid/repo"
          repo_name: "Kanata"
          repo_description: "Official Kanata releases"
          repo_icon: "icon.png"
          archive_older: 5
          EOF
          echo "keystore: keystore.jks" >> fdroid/config.yml
          echo "repo_keyalias: ${{ secrets.KEY_ALIAS }}" >> fdroid/config.yml
          echo "keystorepass: ${{ secrets.KEYSTORE_PASSWORD }}" >> fdroid/config.yml
          echo "keypass: ${{ secrets.KEY_PASSWORD }}" >> fdroid/config.yml

      - name: Copy app icon
        run: cp AppIcon.png fdroid/repo/icon.png 2>/dev/null || true

      - name: Build F-Droid repo index
        working-directory: fdroid
        run: fdroid update --create-metadata --verbose

      - name: Copy repo to docs
        run: |
          mkdir -p docs/fdroid
          cp -r fdroid/repo docs/fdroid/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fdroid/
          git diff --cached --quiet || git commit -m "chore: update F-Droid repo"
          git push
