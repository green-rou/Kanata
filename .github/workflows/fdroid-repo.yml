name: F-Droid Repo

on:
  workflow_run:
    workflows: ["CI / Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release APK
        run: |
          mkdir -p fdroid/repo
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_TAG" --pattern "*.apk" --dir fdroid/repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy app icon
        run: cp AppIcon.png fdroid/repo/icon.png 2>/dev/null || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fdroid/keystore.jks

      - name: Generate index-v1.json
        run: python3 fdroid/generate_index.py fdroid/repo
        env:
          REPO_URL:  "https://green-rou.github.io/Kanata/fdroid/repo"
          REPO_NAME: "Kanata"
          REPO_DESC: "Official Kanata releases"

      - name: Pack and sign index-v1.jar
        run: |
          cd fdroid/repo
          zip -j index-v1.jar index-v1.json
          jarsigner \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            index-v1.jar "${{ secrets.KEY_ALIAS }}"

      - name: Copy repo to docs
        run: |
          mkdir -p docs/fdroid/repo
          cp -r fdroid/repo/. docs/fdroid/repo/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fdroid/
          git diff --cached --quiet || git commit -m "chore: update F-Droid repo"
          git push

      - name: Cleanup secrets
        if: always()
        run: rm -f fdroid/keystore.jks
