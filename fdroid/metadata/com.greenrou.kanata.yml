AutoName: Kanata
Description: |-
  An extension-based anime browser for Android.

  Browse the AniList catalogue, save favourites, and discover new anime.
  Extend the app with community-built extension mods installed from the
  Extensions screen.

  The core app hosts zero content. All sources are user-managed via extensions.

