query GetAnimeList($page: Int!, $perPage: Int!, $type: MediaType!, $isAdult: Boolean, $search: String, $genres: [String], $formats: [MediaFormat]) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
      currentPage
    }
    media(type: $type, isAdult: $isAdult, search: $search, genre_in: $genres, format_in: $formats, sort: [POPULARITY_DESC]) {
      id
      title {
        userPreferred
      }
      coverImage {
        large
      }
      format
      averageScore
      genres
      episodes
      chapters
      volumes
      isAdult
    }
  }
}
