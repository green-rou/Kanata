query GetAnimeDetail($id: Int!, $type: MediaType!) {
  Media(id: $id, type: $type) {
    id
    title {
      userPreferred
      english
      romaji
    }
    description(asHtml: false)
    coverImage {
      large
    }
    format
    status
    episodes
    chapters
    volumes
    genres
    averageScore
    meanScore
    popularity
    startDate {
      year
      month
      day
    }
  }
}
